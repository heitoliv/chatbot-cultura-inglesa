services:

  # ── Banco de dados do Typebot ──────────────────────
  typebot-db:
    image: postgres:15
    container_name: typebot-db
    restart: always
    environment:
      POSTGRES_DB: typebot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - typebot-db-data:/var/lib/postgresql/data
    networks:
      - chatbot-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U typebot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (sessões e cache) ─────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - chatbot-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Typebot Builder (painel visual) ────────────────
  typebot-builder:
    image: baptistearno/typebot-builder:latest
    container_name: typebot-builder
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      typebot-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://typebot:${DB_PASSWORD}@typebot-db/typebot
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      NEXT_PUBLIC_VIEWER_URL: ${NEXT_PUBLIC_VIEWER_URL}
    networks:
      - chatbot-net

  # ── Typebot Viewer (execução dos fluxos) ───────────
  typebot-viewer:
    image: baptistearno/typebot-viewer:latest
    container_name: typebot-viewer
    restart: always
    ports:
      - "3001:3000"
    depends_on:
      typebot-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://typebot:${DB_PASSWORD}@typebot-db/typebot
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      NEXT_PUBLIC_VIEWER_URL: ${NEXT_PUBLIC_VIEWER_URL}
    networks:
      - chatbot-net

  # ── n8n (integrações e automações) ─────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      N8N_HOST: localhost
      N8N_PORT: 5678
      WEBHOOK_URL: http://localhost:5678
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - chatbot-net

  # ── Evolution API (ponte com WhatsApp) ─────────────
  evolution-api:
    image: atendai/evolution-api:v1.8.7
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      typebot-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_URL: http://evolution-api:8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:${DB_PASSWORD}@typebot-db:5432/evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_TTL: "604800"
      SESSION_STORE: "REDIS"           # ← ADICIONE ESTA
      CONNECTION_TIMEOUT: "60000"      # ← ADICIONE ESTA
      ENABLE_WEBHOOKS: "true"          # ← ADICIONE ESTA
      LOG_LEVEL: "info"                # ← Mude para info se estiver debug
      WA_HEADLESS: "true"
      WA_DISABLE_SANDBOX: "true"
      WA_ARGS: "--no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage"
    volumes:
      - evolution-data:/evolution/instances
      - /tmp/evolution-chrome-cache:/chrome-cache  # ← FIX CRÍTICO!
    networks:
      - chatbot-net

volumes:
  typebot-db-data:
  redis-data:
  n8n-data:
  evolution-data:
  evolution-chrome-cache:  # ← NOVO VOLUME

networks:
  chatbot-net:
    driver: bridge